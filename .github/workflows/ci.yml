name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: ./cmd/mcp-server/ ./internal/... ./services/...

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: |
          VERSION=$(node -p "require('./npm/package.json').version")
          go build -ldflags "-X main.serverVersion=${VERSION}" -o build/bin/claude-config-mcp ./cmd/mcp-server/

      - name: Test
        run: go test ./cmd/mcp-server/ ./internal/... -v -count=1
