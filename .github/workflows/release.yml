name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "20"

jobs:
  # Job 1: Cross-compile Go binaries
  build-binaries:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            npm_platform: darwin-arm64
          - goos: darwin
            goarch: amd64
            npm_platform: darwin-x64
          - goos: linux
            goarch: amd64
            npm_platform: linux-x64
          - goos: linux
            goarch: arm64
            npm_platform: linux-arm64
          - goos: windows
            goarch: amd64
            npm_platform: win32-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist/${{ matrix.npm_platform }}
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o dist/${{ matrix.npm_platform }}/claude-config-mcp${EXT} ./cmd/mcp-server/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.npm_platform }}
          path: dist/${{ matrix.npm_platform }}/

  # Job 2: Package and publish npm
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Assemble npm platform packages
        run: |
          for dir in artifacts/binary-*/; do
            platform=$(basename "$dir" | sed 's/binary-//')
            mkdir -p npm/platforms/${platform}/bin
            cp ${dir}* npm/platforms/${platform}/bin/
            chmod +x npm/platforms/${platform}/bin/claude-config-mcp* 2>/dev/null || true
          done

      - name: Generate platform package.json
        run: node scripts/generate-platform-packages.js

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/platforms/*/; do
            echo "Publishing $(basename $dir)..."
            cd "$dir" && npm publish --access public && cd -
          done

      - name: Publish main package
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  # Job 3: Create GitHub Release
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release archives
        run: |
          mkdir -p release
          for dir in artifacts/binary-*/; do
            platform=$(basename "$dir" | sed 's/binary-//')
            cd ${dir}
            tar -czf ../../release/claude-config-mcp-${platform}.tar.gz *
            cd -
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*.tar.gz
